<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBox Cart</title>
    <script src="https://kit.fontawesome.com/27cfa59273.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>

            <img src="images/logo.png" alt="BiteBox Logo" width="180">

            
                <ul>
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="Menu.html">Menu</a></li>
                    <li><a href="BiteDeals.html">BiteDeals</a></li>
                    <li><a href="Cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a></li>
                    <li><a href="Login.html"><i class="fa-solid fa-right-to-bracket"></i>Login</a></li>
                </ul>
            

        </nav>
    </header>

    <section>
        <table class="cart">
            <thead>
            <th>Item</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Remove</th>
            </thead>

        <tbody>

            <tr>
                <td class="item">
                    <img src="images/veg.png">
                    <div>
                        <h4>Cheese Burger</h4>
                        <p>Juicy grilled burger</p>
                    </div>
                </td>
                <td>₹199</td>
                <td>
                    <div class="qty-box">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                </td>
                <td>₹199</td>
                <td><button class="remove">Remove</button></td>
            </tr>

            <tr>
                <td class="item">
                    <img src="images/momos.png">
                    <div>
                        <h4>Momos</h4>
                        <p>Steam Momo</p>
                    </div>
                </td>
                <td>₹99</td>
                <td>
                    <div class="qty-box">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                </td>
                <td>₹99</td>
                <td><button class="remove">Remove</button></td>
            </tr>
            <tr class="grand-total">
                <td colspan="3">Grand Total</td>
                <td>₹298</td>
                <td><button>Proceed</button></td>
            </tr>

        </tbody>
        </table>
    </section>
</body>
</html>
